name: CI — PulseMate Production Readiness

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: test + coverage ────────────────────────────────────────────────
  backend-test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Run backend unit & integration tests with coverage
        run: npm run test:coverage
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret-minimum-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          COOKIE_SECRET: test-cookie-secret
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          # Disable real external services in tests
          OTP_PROVIDER: console
          EMAIL_PROVIDER: console

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

      - name: Coverage summary comment (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "## Backend Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat backend/coverage/coverage-summary.json 2>/dev/null || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY

  # ── Backend: dependency audit ───────────────────────────────────────────────
  backend-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Audit (fail on critical vulnerabilities)
        run: npm audit --audit-level=critical
        working-directory: backend
        continue-on-error: true   # warn-only during transition period

  # ── Frontend: build check ───────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000

      - name: Verify build artifacts exist
        run: test -d frontend/dist

  # ── Docker images (only on main/develop) ───────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: pulsemate/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: pulsemate/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
