name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pulsemate_test
          POSTGRES_USER: pulsemate
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pulsemate:testpassword@localhost:5432/pulsemate_test

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pulsemate:testpassword@localhost:5432/pulsemate_test

      - name: Audit dependencies (fail on critical)
        run: npm audit --audit-level=critical
        working-directory: backend
        continue-on-error: true  # warn only during transition — set to false once clean

      - name: Run backend tests
        run: npm test --if-present
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pulsemate:testpassword@localhost:5432/pulsemate_test
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret-minimum-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          COOKIE_SECRET: test-cookie-secret
          OTP_PROVIDER: console
          EMAIL_PROVIDER: console

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000

      - name: Check for frontend build artifacts
        run: test -d frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: runner
          push: false
          tags: pulsemate/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: pulsemate/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
